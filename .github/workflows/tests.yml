# .github/workflows/tests.yml
# Workflow do GitHub Actions — roda os testes a cada push ou pull request
# na branch main.

name: ✂️ NextCut — CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── Frontend (Vitest) ────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend   # todos os comandos rodam dentro de /frontend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test

  # ─── Backend (Maven + JUnit 5) ────────────────────────────────────────────
  backend:
    name: Backend Tests (JUnit 5)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend    # todos os comandos rodam dentro de /backend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Rodar testes
        run: mvn test --no-transfer-progress
